<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1024" />
    <title>rustviz</title>
    <!-- Import map FIRST so it's parsed before any `<script type="module">`.
         Trunk's `<link rel="rust">` becomes such a script — the importmap
         must be in place before that script starts loading.

         Each CodeMirror sub-package URL uses `?external=` so esm.sh emits
         bare specifiers (like `import "@codemirror/state"`) for shared deps.
         The map resolves every bare specifier to one canonical URL so all
         packages share the same @codemirror/state + @codemirror/view
         instances — otherwise instanceof checks fail across modules. -->
    <script type="importmap">
    {
      "imports": {
        "@codemirror/state": "https://esm.sh/@codemirror/state@6",
        "@codemirror/view": "https://esm.sh/@codemirror/view@6?external=@codemirror/state",
        "@codemirror/language": "https://esm.sh/@codemirror/language@6?external=@codemirror/state,@codemirror/view",
        "@codemirror/lang-rust": "https://esm.sh/@codemirror/lang-rust@6?external=@codemirror/state,@codemirror/view,@codemirror/language",
        "@codemirror/commands": "https://esm.sh/@codemirror/commands@6?external=@codemirror/state,@codemirror/view,@codemirror/language"
      }
    }
    </script>
    <link data-trunk rel="css" href="style.css" />
    <link data-trunk rel="rust" href="../Cargo.toml" data-target-name="rustviz" data-type="main" />
    <!-- Trunk doesn't process plain `<script>` tags. Tell it to copy index.js
         to dist/ so the browser fetches it with the right MIME type. -->
    <link data-trunk rel="copy-file" href="index.js" />
    <!-- M05: serve the `.rs` sample sources so `/samples/<id>.rs` resolves.
         Replaces the M04 `traces` copy-dir (no more pre-recorded JSON). -->
    <link data-trunk rel="copy-dir" href="samples" />
  </head>
  <body>
    <header>
      <h1>rustviz</h1>
      <label for="sample-selector">Sample:</label>
      <select id="sample-selector">
        <option value="m03_arithmetic">Arithmetic</option>
        <option value="m03_fn_call">Function Call</option>
        <option value="m03_fn_call_twice">Function Call (Twice)</option>
        <option value="m03_shadow">Shadowing</option>
        <option value="m03_div_by_zero">Division by Zero</option>
        <option value="m05_minimal">Minimal (M05)</option>
        <option value="m05_let_chain">Let chain (M05)</option>
        <option value="m05_double">Double fn (M05)</option>
        <option value="m05_broken_parse">Broken parse (M05)</option>
        <option value="m03_2_basic_u8">u8 arithmetic (M03.2)</option>
        <option value="m03_2_u8_overflow">u8 overflow (M03.2)</option>
        <option value="m03_2_float_nan">f64 NaN (M03.2)</option>
        <option value="m06_shared_borrow">Shared borrow (M06)</option>
        <option value="m06_mut_borrow">Mutable borrow (M06)</option>
        <option value="m06_aliasing_error">Aliasing error (M06)</option>
        <option value="m06_scoped_borrow">Scoped borrow (M06)</option>
        <option value="m06_1_assign_basic">Direct assignment (M06.1)</option>
        <option value="m06_1_deref_read">Deref read (M06.1)</option>
        <option value="m06_1_deref_write">Deref write (M06.1)</option>
        <option value="m07_box">Box (M07)</option>
        <option value="m07_vec_realloc">Vec realloc (M07)</option>
        <option value="m07_vec_realloc_blocked">Vec realloc, blocked by Box (M07)</option>
        <option value="m07_heap_reuse">Heap allocator reuse (M07)</option>
        <option value="m07_string">String (M07)</option>
        <option value="m07_1_slice_basic">Slice basic (M07.1)</option>
        <option value="m07_1_slice_range">Slice range (M07.1)</option>
        <option value="m07_1_slice_dangling">Slice dangling (M07.1)</option>
        <option value="m07_2_str_literal">Str literal (M07.2)</option>
        <option value="m07_2_str_subslice">&amp;str sub-slice (M07.2)</option>
        <option value="m07_2_string_from">String::from + static (M07.2)</option>
        <option value="m07_2_string_from_binding">String::from(&amp;str binding) + copy arrow (M07.2)</option>
        <option value="m07_2_push_str">push_str + static (M07.2)</option>
      </select>
    </header>

    <main>
      <section id="editor" aria-label="source code"></section>
      <section id="stacks" aria-label="stacks panel"></section>
      <!-- M07.2: static memory region (read-only data segment). Holds
           one block per unique string-literal content; persists for the
           trace's lifetime. -->
      <section id="static" aria-label="static memory">
        <header class="static-label">static memory (RO)</header>
      </section>
      <section id="heap" aria-label="heap panel"></section>
      <!-- M06: SVG arrow overlay drawn above all panels. pointer-events:none
           so clicks pass through to the underlying panels. M07 adds a black
           marker for owning arrows (Box/Vec/String -> heap). -->
      <svg id="arrow-overlay" aria-hidden="true">
        <defs>
          <!-- M07: markerUnits="userSpaceOnUse" pins the arrowhead size in
               absolute pixels so it doesn't scale with stroke-width.
               fill="context-stroke" makes the arrowhead inherit the line's
               stroke color, so hovering (which changes the path's stroke)
               recolors both the line AND the arrowhead together. -->
          <marker id="arrow-head-shared" viewBox="0 0 10 10" refX="9" refY="5"
                  markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
                  orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="context-stroke" />
          </marker>
          <marker id="arrow-head-mut" viewBox="0 0 10 10" refX="9" refY="5"
                  markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
                  orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="context-stroke" />
          </marker>
          <marker id="arrow-head-owning" viewBox="0 0 10 10" refX="9" refY="5"
                  markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
                  orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="context-stroke" />
          </marker>
          <!-- M07.2: orange arrowhead for the transient "bytes copied"
               arrow (String::from / push_str data-flow indicator). -->
          <marker id="arrow-head-copy" viewBox="0 0 10 10" refX="9" refY="5"
                  markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
                  orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="context-stroke" />
          </marker>
        </defs>
      </svg>
    </main>

    <div id="status" hidden></div>

    <footer id="toolbar">
      <button id="btn-rewind" type="button" aria-label="rewind">⏮ Rewind</button>
      <button id="btn-step-back" type="button" aria-label="step back">◀ Step Back</button>
      <button id="btn-play-pause" type="button" data-state="paused" aria-label="play">▶ Play</button>
      <button id="btn-step-forward" type="button" aria-label="step forward">Step Forward ▶</button>
      <span id="step-indicator">0 / 0</span>
    </footer>

    <noscript>rustviz requires JavaScript to be enabled.</noscript>

    <script type="module" src="index.js"></script>
  </body>
</html>
