[build]
target = "index.html"
dist = "dist"

[serve]
addresses = ["127.0.0.1"]
port = 8080

# M05: the gen_traces pre-build hook is gone — the page now compiles source
# live in-browser via Player::set_source. The `gen_traces` binary still
# exists for CLI offline pipeline verification (`cargo run --bin gen_traces`).
#
# The watcher still ignores `traces/` (now-unused, gitignored) and `dist/`
# (trunk's output dir) so trunk doesn't loop on its own writes.
[watch]
ignore = ["traces", "dist"]
